---
deployment:
  tasks:
    # Copy all files from dist/ to the document root
    - export REPO_ROOT=$DEPLOYPATH
    - find $REPO_ROOT/dist -mindepth 1 -maxdepth 1 -exec cp -r {} $REPO_ROOT/ \;
    # Remove the dist folder
    - rm -rf $REPO_ROOT/dist
    # Create .htaccess for React Router (SPA)
    - echo 'RewriteEngine On' > $REPO_ROOT/.htaccess
    - echo 'RewriteBase /' >> $REPO_ROOT/.htaccess
    - echo 'RewriteRule ^index\.html$ - [L]' >> $REPO_ROOT/.htaccess
    - echo 'RewriteCond %{REQUEST_FILENAME} !-f' >> $REPO_ROOT/.htaccess
    - echo 'RewriteCond %{REQUEST_FILENAME} !-d' >> $REPO_ROOT/.htaccess
    - echo 'RewriteRule . /index.html [L]' >> $REPO_ROOT/.htaccess
