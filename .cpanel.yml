---
deployment:
  tasks:
    - export DEPLOY=/home2/theisbcc/iqama.theisbc.ca

    # Install all dependencies (devDependencies needed for build)
    - npm install

    # Build the Vite app
    - npm run build

    # Deploy built files to the document root
    - /usr/bin/rsync -avz --delete dist/ $DEPLOY/

    # Create .htaccess for React Router (client-side routing)
    - |
      cat > $DEPLOY/.htaccess << 'EOF'
      RewriteEngine On
      RewriteBase /
      RewriteRule ^index\.html$ - [L]
      RewriteCond %{REQUEST_FILENAME} !-f
      RewriteCond %{REQUEST_FILENAME} !-d
      RewriteRule . /index.html [L]
      EOF
