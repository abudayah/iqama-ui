name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_API_BASE_URL: https://iqama.theisbc.ca
          VITE_BASE_PATH: /
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  deploy-to-branch:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_API_BASE_URL: https://iqama.theisbc.ca
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy to prod branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save the built dist folder to a temporary location
          cp -r dist /tmp/dist-build
          
          # Stash any local changes (like compiled vite.config.js)
          git stash --include-untracked || true
          
          # Fetch the prod branch if it exists
          git fetch origin prod:prod 2>/dev/null || git checkout -b prod
          
          # Switch to prod branch
          git checkout prod
          
          # Remove all existing files except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # Copy build files from temporary location (including dotfiles like .htaccess)
          cp -r /tmp/dist-build/. .
          
          # Clean up temporary folder
          rm -rf /tmp/dist-build
          
          # Add all files to git
          git add -A
          
          # Commit the build (allow empty in case nothing changed)
          git commit -m "Build: ${{ github.sha }} from ${{ github.ref_name }}" || echo "No changes to commit"
          
          # Push to prod branch (no force, linear history)
          git push origin prod
