name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_API_BASE_URL: https://iqama.theisbc.ca/api
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  deploy-to-branch:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_API_BASE_URL: https://iqama.theisbc.ca/api
        run: npm run build

      - name: Deploy to prod branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save the built dist folder to a temporary location
          cp -r dist /tmp/dist-build
          
          # Fetch the prod branch if it exists
          git fetch origin prod:prod 2>/dev/null || git checkout -b prod
          
          # Switch to prod branch
          git checkout prod
          
          # Remove all existing files except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # Copy build files from temporary location
          cp -r /tmp/dist-build/* .
          
          # Clean up temporary folder
          rm -rf /tmp/dist-build
          
          # Create .htaccess for React Router (SPA) in /ui/ subdirectory
          cat > .htaccess << 'EOF'
          # Don't show directory listings for URLs which map to a directory.
          Options -Indexes
          
          # Set the default handler.
          DirectoryIndex index.html
          
          # Add correct encoding for SVGZ.
          AddType image/svg+xml svg svgz
          AddEncoding gzip svgz
          
          # Block access to "hidden" directories whose names begin with a period.
          RewriteRule "/\.|^\.(?!well-known/)" - [F]
          
          # To redirect all users to access the site WITHOUT the 'www.' prefix
          RewriteCond %{HTTP_HOST} ^www\.(.+)$ [NC]
          RewriteRule ^ http%{ENV:protossl}://%1%{REQUEST_URI} [L,R=301]
          
          # Requires mod_expires to be enabled.
          <IfModule mod_expires.c>
            # Enable expirations.
            ExpiresActive On
            # Cache all files for 1 year after access.
            ExpiresDefault "access plus 1 year"
          </IfModule>
          
          # Fallback resource for SPA routing
          FallbackResource /ui/index.html
          
          # Rewrite rules for React Router SPA
          <IfModule mod_rewrite.c>
            RewriteEngine on
            RewriteBase /ui/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !=/favicon.ico
            RewriteRule ^.*$ /ui/index.html [NC,L,QSA]
          </IfModule>
          
          # Various header fixes.
          <IfModule mod_headers.c>
            # Disable content sniffing for all responses, since it's an attack vector.
            Header onsuccess unset X-Content-Type-Options
            Header always set X-Content-Type-Options nosniff
            # Disable Proxy header, since it's an attack vector.
            RequestHeader unset Proxy
          </IfModule>
          EOF
          
          # Add all files to git
          git add -A
          
          # Commit the build (allow empty in case nothing changed)
          git commit -m "Build: ${{ github.sha }} from ${{ github.ref_name }}" || echo "No changes to commit"
          
          # Push to prod branch (no force, linear history)
          git push origin prod
